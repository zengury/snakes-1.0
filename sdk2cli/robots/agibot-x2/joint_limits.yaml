# AGIBOT X2 Joint Limits — CORRECTED
# Source: AimDK_X2 SDK motocontrol.py (https://github.com/zengury/SDK-X2)
# Official spec: 30 active DOF (neck 1 + arms 7×2 + waist 3 + legs 6×2)
# OmniHand: optional accessory, 10 DOF per hand (not counted in body DOF)
# URDF: not publicly available

robot: agibot-x2
active_dof: 30    # official spec: body motors only, excludes hands
total_joints: 51  # including optional OmniHand (20) + head_pitch (N/A)
units: radians
source: sdk_source_code

